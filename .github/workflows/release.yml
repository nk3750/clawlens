name: Release

# Tag-triggered release pipeline. Builds + verifies the tarball, then publishes
# to ClawHub, npm, and a GitHub Release in parallel. Tag pushes are restricted
# to maintainers (per public-repo branch protection at D-10), so no fork-PR
# exfiltration risk on the write-scoped GITHUB_TOKEN.
on:
  push:
    tags: ["v*"]

# Scoped to this workflow only. CI uses contents: read.
permissions:
  contents: write

# Different tags shouldn't queue — but if rc.N and v1.0.0 both fire close
# together by mistake, let both finish rather than cancelling.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build + verify tarball
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - name: Install backend dependencies
        run: npm ci
      - name: Install + build dashboard
        working-directory: dashboard
        run: npm ci && npm run build
      - name: Compile backend
        run: npx tsc -p tsconfig.json
      - name: Run check (tests + lint)
        run: npm run check
      - id: meta
        name: Extract version from tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Sync package.json version to tag
        # CRITICAL: without this, npm publish ships whatever's in the committed
        # package.json (which historically said "1.0.0"). v1.0.0-rc.1 caught the
        # bug — the rc tag intended to publish 1.0.0-rc.1 but actually published
        # 1.0.0 (the literal package.json value), promoting it to npm's `latest`
        # before any matrix validation. Bump the in-runner package.json to the
        # tag-derived version BEFORE npm pack / publish so all three publish
        # channels (npm, ClawHub, GH Release tarball) carry the correct version.
        # `--allow-same-version` lets stable tags (v1.0.0) work without erroring
        # when the committed package.json already matches.
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.meta.outputs.version }}"
      - name: Pack tarball
        run: npm pack
      # Defensive verification: the publish-time error of shipping an empty
      # dist/ or missing manifest produces a silent install failure on the
      # consumer side. Better to fail loudly here.
      - name: Verify tarball includes built artifacts
        run: |
          mkdir -p /tmp/tarball-verify
          tar -xzf nk3750-openclaw-clawlens-*.tgz -C /tmp/tarball-verify
          test -f /tmp/tarball-verify/package/dist/index.js \
            || { echo "::error::tarball missing dist/index.js — backend not built"; exit 1; }
          test -f /tmp/tarball-verify/package/dashboard/dist/index.html \
            || { echo "::error::tarball missing dashboard/dist/index.html — SPA not built"; exit 1; }
          test -f /tmp/tarball-verify/package/openclaw.plugin.json \
            || { echo "::error::tarball missing openclaw.plugin.json — manifest required for OpenClaw plugin loading"; exit 1; }
          rm -rf /tmp/tarball-verify
      - uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: "*.tgz"
          retention-days: 7

  publish-clawhub:
    name: Publish to ClawHub
    needs: build
    # Only the public mirror has CLAWHUB_TOKEN configured. Tag pushes to the
    # private dev repo trigger this workflow too (the workflow file is
    # mirrored), but without secrets the publish would fail at auth. Skip
    # cleanly instead. Note: case-sensitive — private is nk3750/clawLens
    # (capital L), public is nk3750/clawlens (all lowercase, per D-1).
    if: github.repository == 'nk3750/clawlens'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install ClawHub CLI
        run: npm i -g clawhub
      - name: Publish to ClawHub
        # The clawhub CLI does NOT auto-consume CLAWHUB_TOKEN from the env;
        # it requires either an interactive `clawhub login` or a programmatic
        # `clawhub login --token <T> --no-browser` to seed its config file
        # before any subcommand. v1.0.0-rc.1 caught this — the publish step
        # exited with "Error: Not logged in. Run: clawhub login" despite
        # CLAWHUB_TOKEN being set.
        #
        # `--version` override: clawhub publish reads package.json from the
        # GitHub source at the given ref. Since we don't commit the version
        # bump (release-engineering best practice — keeps tags clean), we
        # override here so ClawHub records the tag-derived version, not the
        # stale committed one. v1.0.0-rc.2 caught this too — published 1.0.0
        # instead of 1.0.0-rc.2 without this flag.
        run: |
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          clawhub package publish "${{ github.repository }}@${{ github.ref_name }}" --version "${{ needs.build.outputs.version }}" --json
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: build
    # Only the public mirror has NPM_TOKEN configured. See publish-clawhub
    # above for the rationale.
    if: github.repository == 'nk3750/clawlens'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - name: Install backend dependencies
        run: npm ci
      - name: Build dashboard
        working-directory: dashboard
        run: npm ci && npm run build
      - name: Compile backend
        run: npx tsc -p tsconfig.json
      - name: Sync package.json version to tag
        # Same rationale as the build job: ensure npm publish ships the
        # tag-derived version, not the stale committed package.json value.
        # Without this, v1.0.0-rc.1 published as 1.0.0 (the literal value)
        # and promoted to `latest` before validation. See build job for
        # full context.
        run: npm version --no-git-tag-version --allow-same-version "${{ needs.build.outputs.version }}"
      - name: Publish
        # `--tag` flag: prerelease versions (containing a hyphen per semver,
        # e.g. 1.0.0-rc.1) get the `next` dist-tag so they don't promote to
        # `latest`. Stable versions get `latest`. This prevents the
        # premature-promotion bug that v1.0.0-rc.1 exposed.
        run: |
          if [[ "${{ needs.build.outputs.version }}" == *-* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-tarball:
    name: Create GitHub Release
    needs: build
    # Skip on the private dev repo. We don't want internal-only "Releases"
    # cluttering the private repo's Releases tab.
    if: github.repository == 'nk3750/clawlens'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: tarball
      - uses: softprops/action-gh-release@v2
        with:
          files: "nk3750-openclaw-clawlens-*.tgz"
          generate_release_notes: true
          body_path: CHANGELOG.md
          # Auto-flag rc tags as pre-releases (semver: any tag with a hyphen
          # is a pre-release). v1.0.0-rc.1 was mis-flagged as stable until we
          # caught it via API PATCH; this prevents future drift.
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
