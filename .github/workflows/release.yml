name: Release

# Tag-triggered GitHub Release. Tags push from maintainers only, so no
# fork-PR exfiltration risk on the write-scoped GITHUB_TOKEN.
on:
  push:
    tags: ["v*"]

# Scoped to this workflow only. CI uses contents: read.
permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - name: Install backend dependencies
        run: npm ci
      - name: Run check (tests + lint)
        run: npm run check
      - name: Build dashboard
        working-directory: dashboard
        run: npm ci && npm run build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
